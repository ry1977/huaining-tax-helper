<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;background:linear-gradient(135deg,#1a5276 0%,#2980b9 50%,#3498db 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","Segoe UI",sans-serif;
    padding:16px;
}

.container{
    background:#fff;border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.3);
    padding:40px 36px;text-align:center;max-width:420px;width:100%;
    position:relative;overflow:hidden;
}

/* 顶部装饰波浪 */
.container::before{
    content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,#e74c3c,#f39c12,#27ae60,#2980b9,#8e44ad);
}

/* ===== 头部区域（标题+版本号） ===== */
.header-area{text-align:center;margin-bottom:4px}

.title{
    font-size:23px;font-weight:900;color:#1a5276;margin-bottom:2px;
    letter-spacing:2px;line-height:1.35;
}

.version-badge{
    display:inline-block;background:linear-gradient(135deg,#e74c3c,#c0392b);
    color:#fff;font-size:11px;font-weight:700;padding:3px 14px;border-radius:20px;
    margin-top:8px;letter-spacing:1px;
    box-shadow:0 2px 8px rgba(231,76,60,.35);
}

.subtitle-line{
    font-size:12px;color:#95a5a6;margin-top:10px;margin-bottom:22px;
}

/* ===== 二维码区域 ===== */
.qrcode-wrapper{
    background:linear-gradient(135deg,#f0f7fc,#e8f4fd);
    border-radius:18px;padding:22px;border:2.5px dashed #5dade2;
    display:inline-block;margin-bottom:20px;position:relative;
}
.qrcode-wrapper::after{
    content:'📱 扫码使用';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    background:#3498db;color:#fff;font-size:11px;padding:2px 12px;border-radius:10px;
    white-space:nowrap;font-weight:600;
}

/* 左上角小悦悦 - 男税务官（半身，部分被遮蔽） */
.qrcode-boy{
    position:absolute;top:-6px;left:-6px;width:72px;height:80px;z-index:2;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));
    transform:rotate(-5deg);
}
/* 右上角小悦悦 - 女税务官（半身，部分被遮蔽） */
.qrcode-girl{
    position:absolute;top:-6px;right:-6px;width:72px;height:80px;z-index:2;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));
    transform:scaleX(-1) rotate(-5deg);
}

.qrcode-wrapper img,.qrcode-wrapper svg{
    display:block;margin:0 auto;position:relative;z-index:1;
}

.url-display{
    background:#ecf0f1;border-radius:10px;padding:10px 14px;
    word-break:break-all;font-size:11.5px;color:#2980b9;
    font-family:"SF Mono","Consolas","Courier New",monospace;
    margin-bottom:20px;line-height:1.5;
    border:1px solid #d5dbdb;
}

.footer{
    font-size:11.5px;color:#95a5a6;border-top:1px solid #eee;
    padding-top:14px;line-height:1.8;
}
.footer .highlight{color:#e74c3c;font-weight:700}
.footer .org-name{color:#1a5276;font-weight:600}

/* 底部装饰 */
.deco-icons{
    display:flex;justify-content:center;gap:16px;margin-top:10px;opacity:.45
}
.deco-icons span{font-size:18px;}

@media(max-width:400px){
    .container{padding:30px 24px}
    .title{font-size:20px}
    .qrcode-boy,.qrcode-girl{width:58px;height:65px;top:-4px}
    .version-badge{font-size:10px;padding:2px 10px}

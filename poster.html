<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码算税 - 怀宁县税务局</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f0f2f5;
        }
        .poster {
            width: 600px; background: #fff; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.12); overflow: hidden;
            padding: 40px; text-align: center;
        }
        .poster-header {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            margin: -40px -40px 30px; padding: 30px 40px; color: #fff;
        }
        .poster-header h1 { font-size: 24px; margin-bottom: 6px; }
        .poster-header p { font-size: 14px; opacity: .85; }
        .qr-area { margin: 20px 0; }
        .qr-area img { width: 280px; height: 280px; border: 2px solid #e8ecf1; border-radius: 8px; }
        .url-text {
            margin-top: 16px; padding: 10px 20px; background: #f5f7fa;
            border-radius: 8px; font-size: 14px; color: #7f8c8d;
            word-break: break-all;
        }
        .instructions {
            margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8ecf1;
            text-align: left; font-size: 13px; color: #7f8c8d; line-height: 2;
        }
        .instructions strong { color: #2c3e50; }
        .footer-note {
            margin-top: 20px; font-size: 12px; color: #95a5a6;
        }
        @media print {
            body { background: #fff; }
            .poster { box-shadow: none; border: 2px solid #ddd; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="poster-header">
            <h1>自然人出租不动产智能算税助手</h1>
            <p>安徽省安庆市怀宁县 · 税务服务</p>
        </div>
        
        <div class="qr-area">
            <img src="access_qrcode.png" alt="扫码访问算税助手">
        </div>
        
        <div class="url-text" id="urlText">
            访问地址：http://192.168.100.29:8765
        </div>
        
        <div class="instructions">
            <strong>使用说明：</strong><br>
            1. 打开微信/支付宝，扫描上方二维码<br>
            2. 选择房屋所在乡镇、填写租赁信息<br>
            3. 点击"一键计算"，即可查看各项税款明细<br>
            <strong>适用范围：</strong>怀宁县辖区内自然人出租不动产/场地代开发票<br>
            <strong>如有疑问：</strong>请咨询办税大厅或拨打 12366
        </div>
        
        <div class="footer-note">
            本工具仅供纳税参考，实际缴纳税款以税务机关核定为准<br>
            政策更新：2026年4月 | 怀宁县税务局
        </div>
    </div>
</body>
</html>
